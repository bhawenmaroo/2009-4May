<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Indibiotek Pvt. Ltd.</title>
    <meta name="description" content="Indibiotek Private Limited — Biotech solutions for people and planet. Lifesciences, agriculture, scientific services & R&D." />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
      // FOUC-free theme bootstrap — runs before any CSS/JS in <body>.
      // Mirrors logic in src/hooks/useTheme.ts (keep them in sync).
      (function () {
        try {
          var stored = null;
          try { stored = localStorage.getItem("indibiotek-theme"); } catch (e) {}
          var theme = (stored === "dark" || stored === "light")
            ? stored
            : (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
          document.documentElement.setAttribute("data-theme", theme);
          document.documentElement.style.colorScheme = theme;
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "light");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
